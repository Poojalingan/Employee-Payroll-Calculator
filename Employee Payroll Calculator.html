<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employee Payroll Calculator</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Angular -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

  <style>
    body {
      background: linear-gradient(to right, #667eea, #764ba2);
      color: #fff;
    }
    .card {
      border-radius: 15px;
    }
    .result-card {
      background: #fff;
      color: #000;
      border-radius: 15px;
    }
  </style>
</head>

<body ng-app="payrollApp" ng-controller="payrollCtrl">

<div class="container mt-5">
  <div class="row justify-content-center">
    
    <!-- FORM -->
    <div class="col-md-5">
      <div class="card p-4 shadow">
        <h3 class="text-center text-primary mb-3">💼 Payroll Calculator</h3>

        <input type="text" class="form-control mb-2" placeholder="Employee Name" ng-model="emp.name" required>
        <input type="text" class="form-control mb-2" placeholder="Employee ID" ng-model="emp.id">
        <input type="date" class="form-control mb-2" ng-model="emp.date">

        <input type="number" class="form-control mb-2" placeholder="Basic Salary" ng-model="emp.salary">
        <input type="number" class="form-control mb-2" placeholder="HRA" ng-model="emp.hra">
        <input type="number" class="form-control mb-3" placeholder="DA" ng-model="emp.da">

        <button class="btn btn-primary w-100" ng-click="calculate()">Calculate</button>
      </div>
    </div>

    <!-- RESULT -->
    <div class="col-md-5" ng-if="result">
      <div class="result-card p-4 shadow">
        <h4 class="text-center text-success mb-3">📊 Salary Summary</h4>

        <p><strong>Name:</strong> {{result.name}}</p>
        <p><strong>ID:</strong> {{result.id}}</p>
        <p><strong>Date:</strong> {{result.date}}</p>

        <hr>

        <p><strong>Gross Salary:</strong> ₹{{result.gross}}</p>
        <p><strong>Tax:</strong> ₹{{result.tax}}</p>
        <p><strong>Net Salary:</strong> ₹{{result.net}}</p>
      </div>
    </div>

  </div>
</div>

<script>
var app = angular.module("payrollApp", []);

app.controller("payrollCtrl", function($scope) {

  $scope.calculate = function() {

    let salary = +$scope.emp.salary || 0;
    let hra = +$scope.emp.hra || 0;
    let da = +$scope.emp.da || 0;

    let gross = salary + hra + da;
    let tax = 0;

    if (gross >= 20000 && gross < 40000) tax = gross * 0.05;
    else if (gross >= 40000 && gross < 60000) tax = gross * 0.10;
    else if (gross >= 60000) tax = gross * 0.15;

    let net = gross - tax;

    $scope.result = {
      name: $scope.emp.name,
      id: $scope.emp.id,
      date: $scope.emp.date ? new Date($scope.emp.date).toLocaleDateString() : "",
      gross: gross,
      tax: tax.toFixed(2),
      net: net.toFixed(2)
    };
  };

});
</script>

</body>
</html>
